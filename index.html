
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Box | Premium AI-Powered Bookstore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #4f46e5;
            --brand-secondary: #0f172a;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #f8fafc;
            overflow-x: hidden;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* Liquid Glass Styles */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .liquid-glass-dark {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px) saturate(120%);
            -webkit-backdrop-filter: blur(20px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Organic Background Blobs - Optimized */
        .blob {
            position: absolute;
            filter: blur(100px);
            z-index: -1;
            border-radius: 50%;
            opacity: 0.5;
            animation: move-blob 20s infinite alternate ease-in-out;
            will-change: transform;
            pointer-events: none;
        }

        @keyframes move-blob {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5%, 10%) scale(1.1); }
            66% { transform: translate(-10%, 5%) scale(0.9); }
            100% { transform: translate(2%, -5%) scale(1.05); }
        }

        /* Keyframes for App animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 3D Animations */
        .perspective-lg { perspective: 2000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }

        .book-3d-card {
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }
        .book-3d-container:hover .book-3d-card {
            transform: rotateY(-30deg) rotateX(8deg) translateX(-12px) translateZ(30px);
        }

        /* Glossy Reflection */
        .gloss-effect::after {
            content: '';
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: linear-gradient(
                45deg,
                transparent 0%,
                rgba(255, 255, 255, 0.05) 45%,
                rgba(255, 255, 255, 0.3) 50%,
                rgba(255, 255, 255, 0.05) 55%,
                transparent 100%
            );
            transition: all 0.6s ease;
            pointer-events: none;
            transform: rotate(-45deg);
            will-change: top, left;
        }
        .book-3d-container:hover .gloss-effect::after {
            top: 100%;
            left: 100%;
        }

        /* Page Transitions */
        .page-enter {
            animation: fluidEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            will-change: opacity, transform, filter;
        }
        @keyframes fluidEnter {
            from { opacity: 0; transform: translateY(15px) scale(0.99); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>
</head>
<body class="perspective-lg selection:bg-indigo-100 selection:text-indigo-700">
    <div class="blob w-[600px] h-[600px] bg-indigo-200 top-[-15%] left-[-15%]"></div>
    <div class="blob w-[500px] h-[500px] bg-purple-100 bottom-[-10%] right-[-10%]" style="animation-duration: 25s; animation-delay: -5s;"></div>
    <div class="blob w-[400px] h-[400px] bg-blue-100 top-[35%] right-[5%]" style="animation-duration: 18s; animation-delay: -2s;"></div>

    <div id="root"></div>
</body>
</html>
